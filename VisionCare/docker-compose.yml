services:

  # ─── FASTAPI BACKEND ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: visioncare-backend
    ports:
      - "8000:8000"
    volumes:
      # Model checkpoints — place your .pth files here on your HOST machine
      - ./backend/models:/app/models
      # CXR demo images — place your patient images here
      - ./backend/demo_images:/app/demo_images
      # Medical textbooks (PDFs) for RAG index building
      - ./backend/medical_texts:/app/medical_texts
      # RAG FAISS index (persisted across restarts)
      - ./backend/rag_index:/app/rag_index
      # SQLite app data (patients + encounters)
      - ./backend/data:/app/data
      # Mount the parent VisionCare folder so backend can import colab_fusion_v2.py
      - .:/visioncare_src
    environment:
      - MODEL_VERSION=V3
      - PYTHONPATH=/app:/visioncare_src
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_TIMEOUT_SEC=${GEMINI_TIMEOUT_SEC:-35}
      - GEMINI_MAX_RETRIES=${GEMINI_MAX_RETRIES:-3}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── REACT FRONTEND ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./visioncare-app
      dockerfile: Dockerfile
    container_name: visioncare-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: visioncare-net
